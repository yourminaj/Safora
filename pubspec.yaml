name: safora
description: "Your Family's Safety Guardian — All-in-one personal safety & emergency alert app."
publish_to: 'none'
version: 1.2.15+31

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Navigation
  go_router: ^17.1.0

  # Dependency Injection
  get_it: ^9.2.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.3
  firebase_analytics: ^11.5.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_messaging: ^15.2.4
  firebase_remote_config: ^5.4.5
  firebase_ml_model_downloader: ^0.3.0+9
  cloud_functions: ^5.6.2

  # Location & Maps
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Sensors
  sensors_plus: ^7.0.0

  # Audio
  audioplayers: ^6.6.0

  # Permissions
  permission_handler: ^12.0.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # UI Enhancements
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  animate_do: ^4.2.0
  flutter_svg: ^2.2.4

  # Connectivity
  connectivity_plus: ^7.0.0

  # Battery
  battery_plus: ^7.0.0

  # URL Launcher
  url_launcher: ^6.3.2

  # HTTP Client
  http: ^1.6.0

  # Share
  share_plus: ^12.0.1

  # Intl / Date
  intl: ^0.20.2
  google_mobile_ads: ^7.0.0
  uuid: ^4.5.3
  another_telephony: ^0.4.1
  flutter_foreground_task: ^9.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  local_auth: ^3.0.1
  crypto: ^3.0.7
  timezone: ^0.11.0
  tflite_flutter: ^0.12.1
  gma_mediation_meta: ^1.5.1
  purchases_flutter: ^9.15.1
  purchases_ui_flutter: ^9.15.1
  package_info_plus: ^9.0.0
  record: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4
  fake_async: ^1.3.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/sounds/
    - assets/images/
    - assets/ml_models/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/safora_icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/safora_icon.png"
